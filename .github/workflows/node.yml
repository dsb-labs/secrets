name: node

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
        description: The Astro application to deploy

concurrency:
  group: ${{ inputs.app }}/${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install NodeJS
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        
      - name: Build
        run: pnpm --filter ${{ inputs.app }} build

      - name: Check formatting
        run: pnpm --filter ${{ inputs.app }} format

      - name: Check for changes
        run: |
          git add .
          git diff --staged --exit-code
