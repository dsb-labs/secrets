name: extension

on:
  push:
    paths:
      - 'extension/src/**'
      - 'extension/public/**'
      - 'extension/package.json'
      - 'extension/vite.config.ts'
      - '.github/workflows/extension.yml'
    branches:
      - main
  pull_request:
    paths:
      - 'extension/src/**'
      - 'extension/public/**'
      - 'extension/package.json'
      - 'extension/vite.config.ts'
      - '.github/workflows/extension.yml'

jobs:
  ci:
    uses: ./.github/workflows/node.yml
    secrets: inherit
    with:
      app: '@keeper/extension'
